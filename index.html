<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            cursor: pointer;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem 4rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3.5rem;
            color: #333;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            color: #666;
        }

        .clock {
            font-size: 1.6rem;
            color: #444;
            margin-bottom: 1.5rem;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            letter-spacing: 2px;
        }

        .version {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #999;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-burst 0.8s ease-out forwards;
        }

        @keyframes particle-burst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }

        .spark {
            position: absolute;
            pointer-events: none;
            animation: spark-fly 1s ease-out forwards;
        }

        @keyframes spark-fly {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock" id="clock"></div>
        <h1>Hello World</h1>
        <p>这是一个测试项目 — Multica 开发流程演示</p>
        <p class="version">v1.1.0</p>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            document.getElementById('clock').textContent = timeStr;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // 鼠标点击粒子特效
        const COLORS = [
            '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3',
            '#54a0ff', '#5f27cd', '#01a3a4', '#f368e0',
            '#ff6348', '#7bed9f', '#70a1ff', '#ffa502'
        ];

        document.body.addEventListener('click', function(e) {
            // 产生 12 个彩色粒子向四周飞散
            const count = 12;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('span');
                particle.classList.add('particle');
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
                const distance = 40 + Math.random() * 80;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                const size = 4 + Math.random() * 8;
                const color = COLORS[Math.floor(Math.random() * COLORS.length)];

                particle.style.width = particle.style.height = size + 'px';
                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';
                particle.style.background = color;
                particle.style.setProperty('--dx', dx + 'px');
                particle.style.setProperty('--dy', dy + 'px');

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }

            // 中心闪点
            const spark = document.createElement('span');
            spark.classList.add('spark');
            spark.style.left = e.clientX + 'px';
            spark.style.top = e.clientY + 'px';
            spark.style.width = '20px';
            spark.style.height = '20px';
            spark.style.background = 'radial-gradient(circle, #fff 0%, rgba(255,255,255,0) 70%)';
            spark.style.borderRadius = '50%';
            spark.style.setProperty('--dx', (Math.random() - 0.5) * 20 + 'px');
            spark.style.setProperty('--dy', (Math.random() - 0.5) * 20 + 'px');
            spark.style.setProperty('--rot', (Math.random() * 360) + 'deg');

            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 1000);
        });
    </script>
</body>
</html>
