name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout HelloWorld
        uses: actions/checkout@v4

      - name: Checkout pages repo
        uses: actions/checkout@v4
        with:
          repository: 2019-02-18/2019-02-18.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages-repo

      - name: Sync files to hello-world/
        run: |
          mkdir -p pages-repo/hello-world
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ pages-repo/hello-world/

      - name: Commit and push
        working-directory: pages-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hello-world/
          git diff --cached --quiet || git commit -m "deploy: sync HelloWorld -> hello-world/ (${{ github.sha }})"
          git push
